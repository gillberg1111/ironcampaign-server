<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IronCampaign — Owner</title>
<style>
  :root { --oxblood:#73121f; --ink:#1a1a1a; --gray:#6b6b6b; --line:#e2e2e2; }
  * { box-sizing:border-box; }
  body { font:16px/1.5 -apple-system,Segoe UI,Roboto,sans-serif; color:var(--ink); max-width:720px; margin:0 auto; padding:24px; }
  h1 { font-weight:800; letter-spacing:.04em; text-transform:uppercase; }
  .sub { color:var(--gray); margin-top:-12px; }
  input,button { font:inherit; padding:10px 12px; border-radius:8px; border:1px solid var(--line); }
  button { background:var(--oxblood); color:#fff; border:none; cursor:pointer; }
  button.secondary { background:#fff; color:var(--oxblood); border:1px solid var(--oxblood); }
  .row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin:12px 0; }
  .card { border:1px solid var(--line); border-radius:12px; padding:16px; margin:16px 0; }
  code { background:#f5f5f5; padding:2px 6px; border-radius:6px; }
  table { width:100%; border-collapse:collapse; }
  th,td { text-align:left; padding:8px; border-bottom:1px solid var(--line); font-size:14px; }
  .phrase { font-size:20px; font-weight:700; letter-spacing:.02em; }
  .msg { color:var(--gray); font-size:14px; }
  .revoked { color:var(--gray); text-decoration:line-through; }
  .qrbox { display:flex; gap:16px; align-items:center; flex-wrap:wrap; margin-top:12px; }
  .qrbox svg { border:1px solid var(--line); border-radius:8px; }
</style>
<script src="qr.js"></script>
</head>
<body>
  <h1>IronCampaign</h1>
  <p class="sub">Owner console — device pairing &amp; management</p>

  <div class="card">
    <div class="row">
      <input id="key" type="password" placeholder="Owner key" style="flex:1" autocomplete="off">
      <button onclick="loadDevices()">Connect</button>
    </div>
    <p class="msg" id="authMsg">The key is kept only in this tab and sent as a Bearer header. It is never stored.</p>
  </div>

  <div class="card">
    <div class="row">
      <button onclick="createPairing()">Create pairing</button>
      <span class="msg" id="pairMsg"></span>
    </div>
    <div id="phraseBox" style="display:none">
      <p class="phrase" id="phrase"></p>
      <div class="qrbox" id="qrBox"></div>
      <p class="msg">Enter this on the device within the window: <span id="expiry"></span></p>
    </div>
  </div>

  <div class="card">
    <div class="row"><strong>Devices</strong><button class="secondary" onclick="loadDevices()">Refresh</button></div>
    <table><thead><tr><th>Name</th><th>Created</th><th>Last seen</th><th></th></tr></thead>
      <tbody id="devices"></tbody></table>
  </div>

<script>
const API = "/api/v1/owner";
const keyEl = () => document.getElementById("key");
const hdr = () => ({ "Authorization": "Bearer " + keyEl().value, "Content-Type": "application/json" });
const fmt = t => t ? new Date(t).toLocaleString() : "—";

async function createPairing() {
  const msg = document.getElementById("pairMsg");
  try {
    const r = await fetch(API + "/pairings", { method:"POST", headers: hdr() });
    if (!r.ok) throw new Error(r.status === 401 ? "Bad owner key" : "HTTP " + r.status);
    const d = await r.json();
    document.getElementById("phrase").textContent = d.phrase;
    document.getElementById("qrBox").innerHTML = generateQRSvg(d.phrase, 3);
    document.getElementById("expiry").textContent = fmt(d.expiresAt);
    document.getElementById("phraseBox").style.display = "block";
    var expiresIn = d.expiresAt - Date.now();
    if (expiresIn > 0) {
      setTimeout(function () { document.getElementById("phraseBox").style.display = "none"; }, expiresIn);
    }
    msg.textContent = "";
  } catch (e) { msg.textContent = e.message; }
}

async function loadDevices() {
  const authMsg = document.getElementById("authMsg");
  try {
    const r = await fetch(API + "/devices", { headers: hdr() });
    if (!r.ok) throw new Error(r.status === 401 ? "Bad owner key" : "HTTP " + r.status);
    const { devices } = await r.json();
    const tbody = document.getElementById("devices");
    tbody.innerHTML = "";
    for (const d of devices) {
      const tr = document.createElement("tr");
      if (d.revoked_at) tr.className = "revoked";
      tr.innerHTML = `<td>${escapeHtml(d.device_name)}</td><td>${fmt(d.created_at)}</td><td>${fmt(d.last_seen_at)}</td>`;
      const td = document.createElement("td");
      if (!d.revoked_at) {
        const b = document.createElement("button");
        b.className = "secondary"; b.textContent = "Revoke";
        b.onclick = () => revokeDevice(d.id);
        td.appendChild(b);
      } else { td.textContent = "revoked"; }
      tr.appendChild(td);
      tbody.appendChild(tr);
    }
    authMsg.textContent = devices.length ? "" : "No devices yet.";
    startAutoRefresh();
  } catch (e) { authMsg.textContent = e.message; stopAutoRefresh(); }
}

async function revokeDevice(id) {
  try {
    const r = await fetch(API + "/devices/" + id + "/revoke", { method:"POST", headers: hdr() });
    if (!r.ok) throw new Error("HTTP " + r.status);
    loadDevices();
  } catch (e) { document.getElementById("authMsg").textContent = e.message; }
}

function escapeHtml(s) { return String(s).replace(/[&<>"]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[c])); }

let autoRefreshTimer = null;
function startAutoRefresh() {
  stopAutoRefresh();
  autoRefreshTimer = setInterval(function () {
    if (document.visibilityState === 'visible' && keyEl().value) {
      loadDevices();
    }
  }, 15000);
}
function stopAutoRefresh() { if (autoRefreshTimer) { clearInterval(autoRefreshTimer); autoRefreshTimer = null; } }
document.addEventListener('visibilitychange', function () {
  if (document.visibilityState === 'visible' && keyEl().value) { loadDevices(); startAutoRefresh(); }
  else { stopAutoRefresh(); }
});
</script>
</body>
</html>
